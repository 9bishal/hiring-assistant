services:
  hiring-assistant:
    build: .
    container_name: ai-hiring-assistant
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=10
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./.langchain:/app/.langchain
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
